<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holaboss</title>
    <style>
      /* Pre-React splash — visible the moment the BrowserWindow paints,
         eliminates the ~450ms blank gap between window-show and React
         mount. Mirrors the WorkspaceBootstrapPane styling so the React
         swap is visually seamless. */
      html, body, #root, #boot-splash {
        margin: 0;
        height: 100%;
        width: 100%;
      }
      /* Colours scoped to the splash element — never on body, or
         system prefers-color-scheme would override the app theme and
         text inheriting from body would render white-on-white when
         system + app schemes disagree. */
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 0;
        pointer-events: none;
        font-family: -apple-system, "Inter Variable", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        background: #0a0a0a;
        color: #f5f5f5;
      }
      @media (prefers-color-scheme: light) {
        #boot-splash { background: #fafafa; color: #111; }
      }
      #boot-splash[hidden] { display: none; }
      .boot-splash-glow {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 60% 50% at 50% 42%,
          rgba(245, 132, 25, 0.10),
          transparent 70%
        );
        pointer-events: none;
      }
      .boot-splash-stack {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .boot-splash-logo-wrap {
        position: relative;
        height: 64px;
        width: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .boot-splash-halo {
        position: absolute;
        inset: 0;
        border-radius: 22px;
        filter: blur(28px);
        background: radial-gradient(
          circle,
          rgba(245, 132, 25, 0.55),
          transparent 70%
        );
        animation: boot-splash-halo 2.8s ease-in-out infinite;
      }
      .boot-splash-logo {
        position: relative;
        height: 56px;
        width: 56px;
        border-radius: 16px;
        box-shadow: 0 10px 28px -12px rgba(245, 132, 25, 0.55);
        user-select: none;
        -webkit-user-drag: none;
      }
      .boot-splash-title {
        margin-top: 24px;
        font-size: 17px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .boot-splash-subtitle {
        margin-top: 6px;
        font-size: 12.5px;
        font-weight: 500;
        opacity: 0.6;
      }
      .boot-splash-dots {
        margin-top: 20px;
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .boot-splash-dots span {
        height: 4px;
        width: 4px;
        border-radius: 999px;
        background: currentColor;
        opacity: 0.4;
        animation: boot-splash-dot 1.2s ease-in-out infinite;
      }
      .boot-splash-dots span:nth-child(2) { animation-delay: 160ms; }
      .boot-splash-dots span:nth-child(3) { animation-delay: 320ms; }
      @keyframes boot-splash-halo {
        0%, 100% { opacity: 0.35; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.08); }
      }
      @keyframes boot-splash-dot {
        0%, 100% { opacity: 0.2; transform: translateY(0); }
        50% { opacity: 1; transform: translateY(-1.5px); }
      }
    </style>
  </head>
  <body>
    <!-- Static splash — painted before React mounts. Removed by main.tsx
         once the React tree has rendered (whether the bootstrap pane or
         the actual workspace UI). -->
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-splash-glow"></div>
      <div class="boot-splash-stack">
        <div class="boot-splash-logo-wrap">
          <div class="boot-splash-halo"></div>
          <img class="boot-splash-logo" src="/logo.svg" alt="" draggable="false" />
        </div>
        <div class="boot-splash-title">Holaboss</div>
        <div class="boot-splash-subtitle">Preparing your desktop</div>
        <div class="boot-splash-dots" role="status" aria-label="Loading">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
