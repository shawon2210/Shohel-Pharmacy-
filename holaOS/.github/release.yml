changelog:
  exclude:
    authors:
      - github-actions
      - dependabot
      - dependabot[bot]
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
        - semver-major
    - title: Features
      labels:
        - feature
        - enhancement
        - feat
    - title: Fixes
      labels:
        - bug
        - bugfix
        - fix
    - title: Maintenance
      labels:
        - chore
        - ci
        - dependencies
        - docs
        - refactor
        - test
    - title: Other Changes
      labels:
        - "*"
